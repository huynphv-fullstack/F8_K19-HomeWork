<!DOCTYPE html>
<html>
<head>

    <title>Dashboard</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">

    <style>

        h1 {
            display: block;
        }

        .title {
            font-weight: bold;
        }

        #special {
            text-align: center;
        }

        h3{
            margin-top:10px;
        }

        .highlight{
            font-size:14px;
        }

    </style>

</head>
<body>

<div class="big">

    <!--
    Phan tu nay co:
    - tag selector: h1
    - class selector: .title
    - id selector: #special
    - inline style: style="color:seafoam"

    Selector thang: Inline style

    Tai sao:
    Inline style co do uu tien cao nhat trong CSS.

    Mau hien thi cuoi cung: seafoam
    -->
    <h1 class="title" id="special" style="color:seafoam">DASHBOARD</h1>

    <h2 class="section">Tong quan he thong</h2>

    <h3 class="title">Courses</h3>
    <p class="highlight">Quan ly khoa hoc</p>

    <h3 class="title">Students</h3>
    <p class="highlight">Quan ly hoc vien</p>

    <h3 class="title">Teachers</h3>
    <p class="highlight">Quan ly giang vien</p>

    <h3 class="title">Orders</h3>
    <p class="highlight">Quan ly don hang</p>

    <h3 class="title">Reports</h3>
    <p class="highlight">Thong ke bao cao</p>

</div>

</body>
</html>
